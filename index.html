<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sl-font-sans, Figtree, system-ui, sans-serif);
    color: var(--sl-color-ink);
    background: var(--sl-color-surface-warm);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  button, input, textarea { font-family: inherit; }
  button:focus-visible, a:focus-visible, input:focus-visible, textarea:focus-visible, [contenteditable]:focus-visible {
    outline: none; box-shadow: 0 0 0 3px var(--sl-focus-ring);
    border-radius: 6px;
  }
  ::selection { background: var(--sl-color-brand-soft); }
  [contenteditable] { cursor: text; }

  @keyframes swmBreathe {
    0%, 100% { transform: scale(0.86); opacity: 0.65; }
    50%      { transform: scale(1.0);  opacity: 1; }
  }
  .swm-breathe { animation: swmBreathe 1.8s var(--sl-ease, cubic-bezier(.4,0,.2,1)) infinite; }
  @keyframes swmToastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .swm-toast { animation: swmToastIn .25s cubic-bezier(.16,1,.3,1) both; }

  @media (prefers-reduced-motion: reduce) {
    .swm-breathe, .swm-toast { animation: none; }
  }

  /* slimmer textareas/inputs to match calm aesthetic */
  textarea.sl-input { line-height: 1.5; }
</style>
